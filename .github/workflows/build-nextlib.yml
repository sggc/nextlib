name: Build NextLib with CAVS/AVS2/AVS3 support

on:
  workflow_dispatch:
    inputs:
      release_tag:
        description: "Release tag (e.g. v1.0.0-cavs)"
        required: true
        default: "v1.0.0-cavs"

permissions:
  contents: write

env:
  ANDROID_NDK_VERSION: "25.2.9519653"

jobs:
  build:
    name: Build NextLib AAR
    runs-on: ubuntu-latest
    timeout-minutes: 120

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up JDK 17
        uses: actions/setup-java@v4
        with:
          java-version: 17
          distribution: temurin

      - name: Set up Android SDK
        uses: android-actions/setup-android@v3

      - name: Install Android NDK and CMake
        run: |
          yes | sdkmanager --licenses || true
          sdkmanager "ndk;${{ env.ANDROID_NDK_VERSION }}" "cmake;3.22.1" "platform-tools"
          echo "ANDROID_NDK_HOME=$ANDROID_HOME/ndk/${{ env.ANDROID_NDK_VERSION }}" >> "$GITHUB_ENV"
          echo "ANDROID_NDK_ROOT=$ANDROID_HOME/ndk/${{ env.ANDROID_NDK_VERSION }}" >> "$GITHUB_ENV"

      - name: Install build dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y \
            build-essential ninja-build pkg-config \
            nasm yasm python3-pip git autoconf automake libtool \
            cmake ccache unzip wget curl

      - name: Setup Gradle
        uses: gradle/actions/setup-gradle@v4
        with:
          validate-wrappers: true
          gradle-home-cache-cleanup: true

      - name: Build AAR (includes ffmpegSetup task)
        run: ./gradlew :media3ext:assembleRelease

      - name: Verify build output
        run: |
          echo "=== FFmpeg output libraries ==="
          find ffmpeg/output -name "*.so" 2>/dev/null | sort || echo "WARNING: No FFmpeg libraries found"
          echo "=== AAR files ==="
          find media3ext/build/outputs/aar -name "*.aar" -ls

      - name: Upload AAR artifact
        uses: actions/upload-artifact@v4
        with:
          name: nextlib-media3ext-cavs-release
          path: media3ext/build/outputs/aar/*.aar
          retention-days: 30

      - name: Create GitHub Release
        if: github.event_name == 'workflow_dispatch'
        uses: softprops/action-gh-release@v2
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        with:
          tag_name: ${{ inputs.release_tag }}
          name: NextLib ${{ inputs.release_tag }}
          generate_release_notes: true
          draft: false
          prerelease: false
          files: |
            media3ext/build/outputs/aar/*.aar
